<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>冰岛之旅 · Iceland 2026</title>
<link rel="manifest" href="manifest.json">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f0f1a; --surface: #1a1a2e; --surface2: #252540;
  --accent: #ff6b6b; --accent2: #4ecdc4; --text: #f0f0f0; --text2: #a0a0b0; --gold: #ffd93d;
}
html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "SF Pro", "Helvetica Neue", sans-serif; background: var(--bg); color: var(--text); }
#map { height: 100vh; width: 100vw; }
.leaflet-control-zoom { display: none; }

/* Day tabs */
.day-tabs {
  position: absolute; top: 50px; left: 8px; right: 8px; z-index: 1000;
  display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch;
  padding: 4px; scrollbar-width: none;
}
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab {
  flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
  background: rgba(26,26,46,0.85); backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text2); font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.day-tab.active { background: var(--accent); color: white; border-color: var(--accent); }
.day-tab .date { font-size: 10px; opacity: 0.7; margin-left: 4px; }

/* Bottom sheet */
.bottom-sheet {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 1001;
  background: var(--surface); border-radius: 16px 16px 0 0;
  max-height: 42vh; transition: max-height 0.3s ease;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.4);
}
.handle { width: 36px; height: 4px; background: #444; border-radius: 2px; margin: 8px auto; cursor: pointer; }
.sheet-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 16px 8px;
}
.sheet-header h2 { font-size: 16px; font-weight: 600; }
.sheet-header .day-info { font-size: 12px; color: var(--text2); }
.nav-btn { background: none; border: none; color: var(--accent); font-size: 22px; cursor: pointer; padding: 4px 8px; }
.sheet-scroll { overflow-y: auto; padding: 0 16px 20px; max-height: calc(42vh - 60px); }
.sheet-scroll::-webkit-scrollbar { width: 3px; }
.sheet-scroll::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

/* POI item */
.poi-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
}
.poi-item:last-child { border-bottom: none; }
.poi-icon {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}
.poi-icon.attraction { background: rgba(255,107,107,0.2); }
.poi-icon.camp { background: rgba(78,205,196,0.2); }
.poi-icon.shop { background: rgba(255,217,61,0.2); }
.poi-info { flex: 1; min-width: 0; }
.poi-name { font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
.is-name { color: var(--accent2); }
.copy-btn { 
  font-size: 11px; background: rgba(78,205,196,0.15); padding: 2px 8px; 
  border-radius: 10px; cursor: pointer; color: var(--accent2); border: none;
  white-space: nowrap;
}
.poi-cn { font-size: 13px; color: var(--text2); margin-top: 1px; }
.poi-desc { font-size: 11px; color: #666; margin-top: 2px; }
.poi-coord { font-size: 10px; color: #555; margin-top: 2px; }
.camp-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.camp-tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: rgba(78,205,196,0.15); color: var(--accent2); }
.detail-section { margin-top: 8px; padding: 8px 0; }
.detail-section .label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.detail-section .value { font-size: 13px; line-height: 1.5; }

/* Toast */
.toast {
  position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.85); color: white; padding: 10px 20px;
  border-radius: 20px; font-size: 13px; z-index: 9999;
  opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap;
}
.toast.show { opacity: 1; }

/* Legend */
.legend {
  position: absolute; bottom: calc(42vh + 10px); right: 8px; z-index: 1000;
  background: rgba(26,26,46,0.85); backdrop-filter: blur(10px);
  border-radius: 10px; padding: 8px 10px;
  font-size: 11px; border: 1px solid rgba(255,255,255,0.08);
}
.legend-item { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* Itinerary link */
.itin-link { text-align:center; padding:8px 0 4px; color:var(--accent); font-size:13px; cursor:pointer; }
/* Detail modal */
.modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; justify-content:center; align-items:flex-end; }
.modal-overlay.show { display:flex; }
.modal-content { background:var(--surface); width:100%; max-width:500px; max-height:70vh; border-radius:16px 16px 0 0; padding:20px; overflow-y:auto; margin:0 auto; animation:slideUp 0.25s ease; }
.modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
.modal-title { font-size:16px; font-weight:600; color:var(--text); }
.modal-close { background:none; border:none; color:var(--text2); font-size:22px; cursor:pointer; padding:4px 8px; }
.modal-body { font-size:13px; line-height:1.7; color:var(--text2); white-space:pre-wrap; }
.detail-btn { background:rgba(78,205,196,0.15); border:none; color:var(--accent2); font-size:11px; padding:2px 8px; border-radius:8px; cursor:pointer; margin-left:6px; }
@keyframes slideUp { from { transform:translateY(100%); } to { transform:translateY(0); } }

/* Popup */
.leaflet-popup-content-wrapper { background: var(--surface) !important; color: var(--text) !important; border-radius: 12px !important; }
.leaflet-popup-tip { background: var(--surface) !important; }
.leaflet-popup-content { margin: 10px 14px !important; font-size: 13px !important; font-family: -apple-system, sans-serif !important; }
.popup-is { color: var(--accent2); font-weight: 500; }
.popup-is .copy-trigger { cursor: pointer; display: inline-flex; align-items: center; gap: 4px; }
.popup-is .copy-trigger:active { opacity: 0.6; }
.popup-cn { color: var(--text2); font-size: 12px; margin-top: 2px; }
.popup-meta { color: #555; font-size: 10px; margin-top: 4px; }

/* Full itinerary list */
.day-block { margin-bottom: 14px; }
.day-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 4px;
}
.day-badge {
  background: var(--accent); color: white; padding: 2px 10px;
  border-radius: 12px; font-size: 11px; font-weight: 600;
}
.day-name { font-size: 13px; font-weight: 500; }
.day-date { font-size: 11px; color: var(--text2); }
.point-row {
  display: flex; align-items: flex-start; gap: 8px; padding: 4px 0 4px 4px;
}
.point-dot {
  width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 5px;
}
.point-dot.attraction { background: var(--accent); }
.point-dot.camp { background: var(--accent2); }
.point-dot.shop { background: var(--gold); }
.point-text { font-size: 12px; }
.point-text .is { }
.point-text .cn { color: var(--text2); font-size: 11px; }
.camp-note { font-size: 11px; color: var(--accent2); padding: 2px 0 0 14px; }

@media (min-width: 768px) {
  .day-tabs { top: 20px; left: 20px; right: 20px; justify-content: center; }
  .bottom-sheet { max-width: 500px; margin: 0 auto; }
}
</style>
</head>
<body>

<!-- Toast -->

// Haversine distance (km)
function haversineKm(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// Pre-calculate segment data (km, min, road) for each day
DAYS.forEach(day => {
  day.segments = [];
  day.totalKm = 0;
  day.totalMin = 0;
  for (let i = 0; i < day.points.length - 1; i++) {
    const a = day.points[i], b = day.points[i+1];
    const km = haversineKm(a.lat, a.lng, b.lat, b.lng);
    const meta = ROAD_META[a.id] || {};
    // Skip flight segments (airport→airport or >1000km)
    const isFlight = km > 1000 || (a.type === 'airport' && b.type === 'airport');
    let min = meta.min;
    if (!min && !isFlight) min = Math.max(5, Math.round(km / 65 * 60)); // avg 65km/h default
    const seg = { km, min, road: meta.road || 'normal', isFlight };
    day.segments.push(seg);
    if (!isFlight) { day.totalKm += km; day.totalMin += (min || 0); }
  }
});

function copyText(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast('📋 已复制: ' + text));
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta); showToast('📋 已复制: ' + text);
  }
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function buildMarkers() {
  allMarkers = [];
  DAYS.forEach((day, di) => {
    day.points.forEach(p => {
      const icon = ICONS[p.type] || ICONS.attraction;
      const marker = L.marker([p.lat, p.lng], { icon }).bindPopup(`
        <div>
          <div class="popup-is">
            <span class="copy-trigger" onclick="copyText('${p.is}')">${p.is} 📋</span>
          </div>
          <div class="popup-cn">${p.cn}</div>
          ${p.desc ? `<div class="popup-meta" style="color:#999">${p.desc}</div>` : ''}
          <div class="popup-meta" style="margin-top:4px">${day.day} · ${day.nameCn}</div>
        </div>
      `);
      marker._dayIndex = di;
      allMarkers.push(marker);
    });
  });
}

function showDay(dayIndex) {
  if (dayIndex < 0 || dayIndex >= DAYS.length) return;
  activeDay = dayIndex;
  const day = DAYS[dayIndex];
  markerGroup.clearLayers();
  routeGroup.clearLayers();
  
  // Draw route line connecting points in order
  const coords = day.points.map(p => [p.lat, p.lng]);
  const routeLine = L.polyline(coords, {
    color: '#ff6b6b', weight: 4, opacity: 0.6, dashArray: '10, 8'
  }).addTo(routeGroup);
  
  const dm = allMarkers.filter(m => m._dayIndex === dayIndex);
  dm.forEach(m => markerGroup.addLayer(m));
  if (dm.length) map.fitBounds(L.featureGroup(dm).getBounds().pad(0.15));
  document.querySelectorAll('.day-tab').forEach((tab, i) => tab.classList.toggle('active', i === dayIndex + 1));
  const at = document.querySelector('.day-tab.active');
  if (at) at.scrollIntoView({ behavior:'smooth', inline:'center', block:'nearest' });
  renderSheet(day, dayIndex);
}

function showAllDays() {
  activeDay = -1;
  markerGroup.clearLayers();
  routeGroup.clearLayers();
  allMarkers.forEach(m => markerGroup.addLayer(m));
  map.fitBounds(L.featureGroup(allMarkers).getBounds().pad(0.1));
  document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));

  document.getElementById('sheetTitle').textContent = '🗺️ 全部行程';

function renderSheet(day, idx) {
  document.getElementById('sheetTitle').textContent = `${day.day} · ${day.nameCn}`;
  const kmText = day.totalKm ? ` · 🛣️ ${Math.round(day.totalKm)} km` : '';
  const timeText = day.totalMin ? ` · 🕐 约 ${day.totalMin} 分钟` : '';
  document.getElementById('sheetSubtitle').textContent = (day.route || '') + kmText + timeText;
  let html = '';
  
  // Flight info
  if (day.flight) {
    html += `<div class="detail-section" style="border-bottom:1px solid rgba(255,255,255,0.08);padding-bottom:10px;margin-bottom:4px">
      <div class="label">✈️ 航班信息</div>`;
    day.flight.segments.forEach(s => {
      html += `<div class="value" style="display:flex;align-items:center;gap:8px;margin:4px 0;font-size:12px">
        <span style="color:var(--gold);font-weight:500">${s.airline}</span>
        <span style="color:var(--text2)">${s.from} → ${s.to}</span>
        <span style="color:#666;font-size:10px">${s.note}</span>
      </div>`;
    });
    html += `<div style="font-size:11px;color:var(--text2);margin-top:4px">
      预订码: ${day.flight.booking} · ${day.flight.passengers}<br>
      <span style="color:var(--accent2)">${day.flight.transfer}</span>
    </div></div>`;
  }
  
  day.points.forEach((p, pi) => {
    if (p.type === 'camp') return;
    const emoji = { attraction:'📍', camp:'🏕️', shop:'🛒', food:'🍽️', airport:'✈️' };
    html += `<div class="poi-item">
      <div class="poi-icon ${p.type}">${emoji[p.type] || '📍'}</div>
      <div class="poi-info">
        <div class="poi-name">
          <span class="is-name">${p.is}</span>
          <button class="copy-btn" onclick="copyText('${p.is}')">📋 复制</button>
          ${p.detail ? `<button class="detail-btn" data-pid="${p.id}">📖 详情</button>` : ''}
        </div>
        <div class="poi-cn">${p.cn}</div>
        ${p.desc ? `<div class="poi-desc">${p.desc}</div>` : ''}
        ${pi < day.segments.length && !day.segments[pi].isFlight ? (() => {
          const seg = day.segments[pi];
          const roadTag = seg.road === 'hard' ? '<span style="background:rgba(255,107,107,0.2);color:#ff6b6b;padding:1px 6px;border-radius:8px;font-size:10px;margin-left:4px">🔴 有难度</span>' :
                         seg.road === 'easy' ? '<span style="background:rgba(78,205,196,0.2);color:#4ecdc4;padding:1px 6px;border-radius:8px;font-size:10px;margin-left:4px">🟢 简易</span>' : '';
          return `<div class="poi-desc" style="color:var(--accent);font-size:10px">→ 约 ${seg.min} 分钟 · ${Math.round(seg.km)} km${roadTag}</div>`;
        })() : ''}
      </div>
    </div>`;
  });
  if (day.camp) {
    // Find camp coordinates from points array
    const campPt = day.points.find(p => p.type === 'camp');
    let toNextHtml = '';
    if (campPt && idx < DAYS.length - 1) {
      const nextDay = DAYS[idx + 1];
      const nextFirst = nextDay.points.find(p => p.type !== 'camp') || nextDay.points[0];
      if (nextFirst) {
        const dist = haversineKm(campPt.lat, campPt.lng, nextFirst.lat, nextFirst.lng);
        toNextHtml = `<div class="poi-desc" style="color:var(--accent2);font-size:11px;margin-top:4px">
          ➡️ 明天第一站 · ${nextFirst.cn} 约 ${Math.round(dist)} km</div>`;
      }
    }
    html += `<div class="poi-item" style="border-top:1px solid rgba(255,255,255,0.1);margin-top:4px;padding-top:12px">
      <div class="poi-icon camp">🏕️</div>
      <div class="poi-info">
        <div class="poi-name">${day.camp.name}</div>
        ${day.camp.tags ? `<div class="camp-tags">${day.camp.tags.map(t => `<span class="camp-tag">✓ ${t}</span>`).join('')}</div>` : ''}
        ${day.camp.note ? `<div class="poi-desc">${day.camp.note}</div>` : ''}
        ${toNextHtml}
      </div>
    </div>`;
  }
  if (day.schedule) {
    html += `<div class="detail-section"><div class="label">⏰ 时间控制</div>`;
    day.schedule.forEach(s => {
      html += `<div class="value" style="display:flex;gap:12px;margin:3px 0"><span style="color:var(--gold);font-weight:500">${s.time}</span><span>${s.action}</span></div>`;
    });
    html += `</div>`;
    if (day.note) html += `<div style="font-size:12px;color:var(--accent2);margin-top:6px">✓ ${day.note}</div>`;
  }
  html += `<div class="itin-link" onclick="showAllDays()">📋 查看全部行程</div>`;
  document.getElementById('sheetContent').innerHTML = html;
}

  const allTab = document.createElement('div');

  allTab.addEventListener('click', showAllDays);

  // Day tabs
  DAYS.forEach((day, i) => {
    const tab = document.createElement('div');
    tab.className = 'day-tab';
    tab.innerHTML = `${day.day} <span class="date">${day.date}</span>`;
    tab.addEventListener('click', () => showDay(i));
    tabs.appendChild(tab);
  });
  
  buildMarkers();
  
  // Auto-detect today
  const now = new Date();
  const todayStr = `${now.getMonth()+1}/${now.getDate()}`;
  const todayIdx = DAYS.findIndex(d => d.date === todayStr);
  if (todayIdx >= 0) {
    showDay(todayIdx);
    allTab.className = 'day-tab';
    tabs.children[todayIdx + 1].className = 'day-tab active';
  } else {
    showAllDays();
  }
  
  // Nav buttons
  document.getElementById('prevDay').addEventListener('click', () => {
    if (activeDay > 0) showDay(activeDay - 1);
  });
  document.getElementById('nextDay').addEventListener('click', () => {
    if (activeDay >= 0 && activeDay < DAYS.length - 1) showDay(activeDay + 1);
  });
  
  // Sheet expand
  let expanded = false;
  document.querySelector('.handle').addEventListener('click', () => {
    expanded = !expanded;
    document.querySelector('.bottom-sheet').style.maxHeight = expanded ? '80vh' : '42vh';
    document.querySelector('.sheet-scroll').style.maxHeight = expanded ? 'calc(80vh - 60px)' : 'calc(42vh - 60px)';
  });
}
document.addEventListener('DOMContentLoaded', init);
function showDetail(title, text) {
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').textContent = text;
  document.getElementById('detailModal').classList.add('show');
}
function closeDetail() {
  document.getElementById('detailModal').classList.remove('show');
}
document.addEventListener('click', function(e) {
  const btn = e.target.closest('.detail-btn');
  if (btn) {
    const pid = btn.dataset.pid;
    const pts = DAYS.flatMap(d => d.points).filter(p => p.id === pid);
    if (pts.length && pts[0].detail) {
      document.getElementById('modalTitle').textContent = pts[0].cn;
      document.getElementById('modalBody').textContent = pts[0].detail;
      document.getElementById('detailModal').classList.add('show');
    }
  }
});
</script>
<div id="detailModal" class="modal-overlay" onclick="if(event.target===this)closeDetail()">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title" id="modalTitle"></div>
      <button class="modal-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>
</body>
</html>
