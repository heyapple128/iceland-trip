<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>冰岛之旅 · Iceland 2026</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇮🇸</text></svg>">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0f0f1a;
  --surface: #1a1a2e;
  --surface2: #252540;
  --accent: #ff6b6b;
  --accent2: #4ecdc4;
  --text: #f0f0f0;
  --text2: #a0a0b0;
  --gold: #ffd93d;
}
html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "SF Pro", "Helvetica Neue", sans-serif; background: var(--bg); color: var(--text); }
#map { height: 100vh; width: 100vw; z-index: 1; }
.leaflet-control-zoom { display: none; }

/* Day tabs */
.day-tabs {
  position: absolute; top: 50px; left: 8px; right: 8px; z-index: 1000;
  display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch;
  padding: 4px; scrollbar-width: none;
}
.day-tabs::-webkit-scrollbar { display: none; }
.day-tab {
  flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
  background: rgba(26,26,46,0.85); backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text2); font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.2s; white-space: nowrap;
  -webkit-tap-highlight-color: transparent;
}
.day-tab.active { background: var(--accent); color: white; border-color: var(--accent); }
.day-tab .date { font-size: 10px; opacity: 0.7; margin-left: 4px; }

/* Bottom sheet */
.bottom-sheet {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 1001;
  background: var(--surface); border-radius: 16px 16px 0 0;
  max-height: 42vh; transition: transform 0.3s ease;
  box-shadow: 0 -4px 20px rgba(0,0,0,0.4);
}
.handle { width: 36px; height: 4px; background: #444; border-radius: 2px; margin: 8px auto; }
.sheet-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 4px 16px 8px;
}
.sheet-header h2 { font-size: 16px; font-weight: 600; }
.sheet-header .day-info { font-size: 12px; color: var(--text2); }
.sheet-header .nav-btn { background: none; border: none; color: var(--accent); font-size: 22px; cursor: pointer; padding: 4px 8px; }
.sheet-scroll { overflow-y: auto; padding: 0 16px 20px; max-height: calc(42vh - 60px); }
.sheet-scroll::-webkit-scrollbar { width: 3px; }
.sheet-scroll::-webkit-scrollbar-thumb { background: #444; border-radius: 3px; }

/* POI item */
.poi-item {
  display: flex; align-items: flex-start; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.06);
}
.poi-item:last-child { border-bottom: none; }
.poi-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.poi-icon.attraction { background: rgba(255,107,107,0.2); }
.poi-icon.camp { background: rgba(78,205,196,0.2); }
.poi-icon.shop { background: rgba(255,217,61,0.2); }
.poi-icon.food { background: rgba(255,217,61,0.2); }
.poi-info { flex: 1; min-width: 0; }
.poi-name { font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; }
.poi-name .is-name { color: var(--accent2); font-size: 12px; cursor: pointer; }
.poi-name .is-name:active { opacity: 0.6; }
.poi-name .copy-badge { font-size: 10px; color: var(--accent2); }
.poi-cn { font-size: 13px; color: var(--text2); margin-top: 1px; }
.poi-desc { font-size: 11px; color: #666; margin-top: 2px; }
.poi-coord { font-size: 10px; color: #555; margin-top: 2px; }

/* Camp info tag */
.camp-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 4px; }
.camp-tag { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: rgba(78,205,196,0.15); color: var(--accent2); }

/* Details section in sheet */
.detail-section { margin-top: 8px; padding: 8px 0; }
.detail-section .label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
.detail-section .value { font-size: 13px; line-height: 1.5; }

/* Toast for copy */
.toast {
  position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,0.8); color: white; padding: 8px 16px;
  border-radius: 20px; font-size: 13px; z-index: 9999;
  opacity: 0; transition: opacity 0.3s; pointer-events: none;
}
.toast.show { opacity: 1; }

/* Legend */
.legend {
  position: absolute; bottom: 45vh; right: 8px; z-index: 1000;
  background: rgba(26,26,46,0.85); backdrop-filter: blur(10px);
  border-radius: 10px; padding: 8px 10px;
  font-size: 11px; border: 1px solid rgba(255,255,255,0.08);
}
.legend-item { display: flex; align-items: center; gap: 6px; margin: 2px 0; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* Full itinerary link */
.itin-link {
  text-align: center; padding: 12px 0 4px; font-size: 12px;
  color: var(--accent2); cursor: pointer;
}

/* Popup custom */
.leaflet-popup-content-wrapper { background: var(--surface) !important; color: var(--text) !important; border-radius: 12px !important; }
.leaflet-popup-tip { background: var(--surface) !important; }
.leaflet-popup-content { margin: 10px 14px !important; font-size: 13px !important; font-family: -apple-system, sans-serif !important; }
.popup-is { color: var(--accent2); font-weight: 500; cursor: pointer; }
.popup-cn { color: var(--text2); font-size: 12px; margin-top: 2px; }
.popup-coord { color: #555; font-size: 10px; margin-top: 4px; }

/* View toggle buttons */
.view-toggle {
  position: absolute; top: 95px; right: 8px; z-index: 1000;
  display: flex; flex-direction: column; gap: 4px;
}
.view-toggle button {
  width: 36px; height: 36px; border-radius: 8px;
  background: rgba(26,26,46,0.85); backdrop-filter: blur(10px);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text); font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.view-toggle button.active { background: var(--accent); border-color: var(--accent); }

/* Responsive */
@media (min-width: 768px) {
  .day-tabs { top: 20px; left: 20px; right: 20px; justify-content: center; }
  .bottom-sheet { max-width: 500px; left: 50%; right: auto; transform: translateX(-50%); width: 100%; border-radius: 16px 16px 16px 16px; bottom: 20px; }
  .bottom-sheet.collapsed { transform: translateX(-50%) translateY(calc(100% - 50px)); }
}
</style>
</head>
<body>

<div id="map"></div>

<!-- Day tabs -->
<div class="day-tabs" id="dayTabs"></div>

<!-- Legend -->
<div class="legend" id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#ff6b6b"></div>景点</div>
  <div class="legend-item"><div class="legend-dot" style="background:#4ecdc4"></div>营地</div>
</div>

<!-- Bottom Sheet -->
<div class="bottom-sheet" id="sheet">
  <div class="handle"></div>
  <div class="sheet-header">
    <button class="nav-btn" id="prevDay">◀</button>
    <div>
      <h2 id="sheetTitle">行程总览</h2>
      <div class="day-info" id="sheetSubtitle">8天冰岛环岛之旅</div>
    </div>
    <button class="nav-btn" id="nextDay">▶</button>
  </div>
  <div class="sheet-scroll" id="sheetContent"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ===================== DATA =====================
const DAYS = [
  {
    day: 'D1', date: '6/14', name: '到达日', nameCn: '到达雷克雅未克',
    route: 'Keflavík Airport → 超市采购 → Hvammsvík Hot Springs → Þingvellir Camping',
    points: [
      { id:'d1-1', type:'shop', lat:63.985, lng:-22.605, is:'Keflavík Airport', cn:'凯夫拉维克机场', desc:'取车' },
      { id:'d1-2', type:'shop', lat:63.945, lng:-22.500, is:'Supermarket', cn:'超市采购', desc:'采购物资（Bonus / Krónan）' },
      { id:'d1-3', type:'attraction', lat:64.300, lng:-21.950, is:'Hvammsvík', cn:'海湾温泉', desc:'特色地热海边温泉' },
      { id:'d1-4', type:'camp', lat:64.255, lng:-21.125, is:'Þingvellir Camping', cn:'辛格维利尔营地', desc:'国家公园内，第二天直接开始黄金圈' },
    ],
    camp: { name:'Þingvellir Camping', note:'国家公园内，不需要做饭洗澡' }
  },
  {
    day: 'D2', date: '6/15', name: '黄金圈', nameCn: '黄金圈',
    route: 'Þingvellir → Geysir → Gullfoss → Hella',
    points: [
      { id:'d2-1', type:'attraction', lat:64.255, lng:-21.125, is:'Þingvellir', cn:'辛格维利尔国家公园', desc:'板块交界+古议会旧址' },
      { id:'d2-2', type:'attraction', lat:64.310, lng:-20.300, is:'Geysir', cn:'盖歇尔间歇泉', desc:'地热间歇泉区' },
      { id:'d2-3', type:'attraction', lat:64.326, lng:-20.121, is:'Gullfoss', cn:'黄金瀑布', desc:'冰岛最具代表性瀑布' },
      { id:'d2-4', type:'camp', lat:63.860, lng:-20.410, is:'Hella Campsite', cn:'海拉营地', desc:'有淋浴、厨房' },
    ],
    camp: { name:'Hella Campsite', tags:['淋浴','厨房'], note:'' }
  },
  {
    day: 'D3', date: '6/16', name: '南岸', nameCn: '南岸',
    route: 'Seljalandsfoss → Skógafoss → Dyrhólaey → Reynisfjara → Vík → Svínafell',
    points: [
      { id:'d3-1', type:'attraction', lat:63.615, lng:-19.988, is:'Seljalandsfoss', cn:'塞里雅兰瀑布', desc:'瀑布后可行走' },
      { id:'d3-2', type:'attraction', lat:63.532, lng:-19.512, is:'Skógafoss', cn:'斯科加瀑布', desc:'可登顶' },
      { id:'d3-3', type:'attraction', lat:63.399, lng:-19.129, is:'Dyrhólaey', cn:'迪霍拉里海岬', desc:'黑沙滩观景台' },
      { id:'d3-4', type:'attraction', lat:63.405, lng:-19.072, is:'Reynisfjara', cn:'黑沙滩', desc:'玄武岩柱黑沙滩' },
      { id:'d3-5', type:'attraction', lat:63.419, lng:-19.009, is:'Vík', cn:'维克镇', desc:'南岸小镇' },
      { id:'d3-6', type:'camp', lat:63.745, lng:-17.420, is:'Svínafell Campground', cn:'斯维纳山营地', desc:'距离冰川徒步集合点约10分钟' },
    ],
    camp: { name:'Svínafell Campground', note:'距离冰川徒步集合点约10分钟' }
  },
  {
    day: 'D4', date: '6/17', name: '冰川日', nameCn: '冰川日',
    route: 'Skaftafell → Jökulsárlón → Diamond Beach → Vestrahorn → Höfn',
    points: [
      { id:'d4-1', type:'attraction', lat:64.020, lng:-16.970, is:'Skaftafell', cn:'斯卡夫塔山', desc:'冰川徒步集合点' },
      { id:'d4-2', type:'attraction', lat:64.078, lng:-16.231, is:'Jökulsárlón', cn:'冰河湖', desc:'冰山漂浮的冰川湖' },
      { id:'d4-3', type:'attraction', lat:64.070, lng:-16.210, is:'Diamond Beach', cn:'钻石沙滩', desc:'冰石在黑沙滩上闪耀' },
      { id:'d4-4', type:'attraction', lat:64.290, lng:-14.970, is:'Vestrahorn', cn:'蝙蝠山', desc:'东侧标志性山体' },
      { id:'d4-5', type:'camp', lat:64.253, lng:-15.212, is:'Höfn Camping', cn:'赫本营地', desc:'有厨房、热水' },
    ],
    camp: { name:'Höfn Camping', tags:['厨房','热水'], note:'' }
  },
  {
    day: 'D5', date: '6/18', name: '东部峡湾', nameCn: '东部峡湾',
    route: 'Djúpivogur → Fáskrúðsfjörður → Seyðisfjörður → Egilsstaðir',
    points: [
      { id:'d5-1', type:'attraction', lat:64.740, lng:-14.240, is:'Djúpivogur', cn:'久皮沃古尔', desc:'东峡湾小渔村' },
      { id:'d5-2', type:'attraction', lat:64.930, lng:-14.010, is:'Fáskrúðsfjörður', cn:'法斯克鲁兹峡湾', desc:'法国文化影响的小镇' },
      { id:'d5-3', type:'attraction', lat:65.260, lng:-13.910, is:'Seyðisfjörður', cn:'塞济斯菲厄泽', desc:'彩色小镇' },
      { id:'d5-4', type:'attraction', lat:65.260, lng:-13.900, is:'Seyðisfjarðarkirkja', cn:'蓝教堂', desc:'标志性蓝色教堂' },
      { id:'d5-5', type:'camp', lat:65.260, lng:-13.800, is:'Egilsstaðir Campsite', cn:'埃基尔斯塔迪尔营地', desc:'设施非常好' },
    ],
    camp: { name:'Egilsstaðir Campsite', note:'设施非常好' }
  },
  {
    day: 'D6', date: '6/19', name: '北部', nameCn: '北部（米湖）',
    route: 'Húsavík → Hverir → Grjótagjá → Dimmuborgir → Hverfjall → Hamrar',
    points: [
      { id:'d6-1', type:'attraction', lat:66.052, lng:-17.344, is:'Húsavík', cn:'胡萨维克', desc:'观鲸小镇' },
      { id:'d6-2', type:'attraction', lat:65.635, lng:-16.830, is:'Hverir', cn:'地热泥浆区', desc:'硫磺地热区' },
      { id:'d6-3', type:'attraction', lat:65.620, lng:-16.880, is:'Grjótagjá', cn:'熔岩洞', desc:'蓝色温泉洞穴（Game of Thrones取景）' },
      { id:'d6-4', type:'attraction', lat:65.590, lng:-16.910, is:'Dimmuborgir', cn:'熔岩城堡', desc:'奇特的熔岩地貌' },
      { id:'d6-5', type:'attraction', lat:65.600, lng:-16.870, is:'Hverfjall', cn:'火山口', desc:'（天气好再去）' },
      { id:'d6-6', type:'camp', lat:65.620, lng:-16.980, is:'Hamrar Camping', cn:'哈姆拉营地（米湖）', desc:'📍阿克雷里方向' },
    ],
    camp: { name:'Hamrar Camping', note:'📍 阿克雷里' }
  },
  {
    day: 'D7', date: '6/20', name: '北部→斯奈山', nameCn: '北部 → 斯奈山',
    route: 'Akureyri → Glaumbær → Kirkjufell → Grundarfjörður',
    points: [
      { id:'d7-1', type:'attraction', lat:65.684, lng:-18.088, is:'Akureyri', cn:'阿克雷里', desc:'北部首府·爱心红灯' },
      { id:'d7-2', type:'attraction', lat:65.684, lng:-18.100, is:'Akureyrarkirkja', cn:'阿克雷里教堂', desc:'地标教堂' },
      { id:'d7-3', type:'attraction', lat:65.825, lng:-19.500, is:'Glaumbær', cn:'草皮屋博物馆', desc:'传统草皮屋' },
      { id:'d7-4', type:'attraction', lat:64.925, lng:-23.310, is:'Kirkjufell', cn:'教会山', desc:'冰岛最上镜的山' },
      { id:'d7-5', type:'camp', lat:64.930, lng:-23.280, is:'Grundarfjörður Campsite', cn:'格伦达菲厄泽营地', desc:'就在教会山旁边' },
    ],
    camp: { name:'Grundarfjörður Campsite', note:'就在教会山旁边' }
  },
  {
    day: 'D8', date: '6/21', name: '斯奈山半岛', nameCn: '斯奈山半岛 → 机场',
    route: 'Kirkjufellsfoss → Arnarstapi → Búðakirkja → Búðir → KEF',
    points: [
      { id:'d8-1', type:'attraction', lat:64.930, lng:-23.310, is:'Kirkjufellsfoss', cn:'教会山瀑布', desc:'教会山前的瀑布' },
      { id:'d8-2', type:'attraction', lat:64.768, lng:-23.620, is:'Arnarstapi', cn:'阿尔纳斯塔皮', desc:'海边小镇+玄武岩' },
      { id:'d8-3', type:'attraction', lat:64.828, lng:-23.390, is:'Búðakirkja', cn:'黑教堂', desc:'标志性黑色教堂' },
      { id:'d8-4', type:'attraction', lat:64.831, lng:-23.378, is:'Búðir', cn:'红房子', desc:'历史红色旅店' },
      { id:'d8-5', type:'shop', lat:63.985, lng:-22.605, is:'Keflavík Airport', cn:'凯夫拉维克机场', desc:'17:00抵达 · 18:00还车' },
    ],
    schedule: [
      { time:'08:00', action:'出发' },
      { time:'14:30', action:'离开斯奈山' },
      { time:'17:00', action:'抵达机场' },
      { time:'18:00', action:'还车' },
    ],
    note: '这个时间非常安全'
  },
];

// ===================== MAP =====================
const map = L.map('map', {
  center: [64.8, -18.5],
  zoom: 6,
  zoomControl: false,
  attributionControl: false,
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18,
}).addTo(map);

L.control.attribution({ position: 'bottomleft', prefix: false }).addTo(map);

// ===================== MARKERS =====================
let allMarkers = [];
let markerGroup = L.layerGroup().addTo(map);
let activeDay = 0;

const ICONS = {
  attraction: L.divIcon({
    html: '<div style="background:#ff6b6b;color:white;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid white;box-shadow:0 1px 6px rgba(0,0,0,0.3);">📍</div>',
    iconSize: [28, 28], iconAnchor: [14, 14], popupAnchor: [0, -16]
  }),
  camp: L.divIcon({
    html: '<div style="background:#4ecdc4;color:white;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid white;box-shadow:0 1px 6px rgba(0,0,0,0.3);">🏕️</div>',
    iconSize: [28, 28], iconAnchor: [14, 14], popupAnchor: [0, -16]
  }),
  shop: L.divIcon({
    html: '<div style="background:#ffd93d;color:#333;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid white;box-shadow:0 1px 6px rgba(0,0,0,0.3);">🛒</div>',
    iconSize: [28, 28], iconAnchor: [14, 14], popupAnchor: [0, -16]
  }),
  food: L.divIcon({
    html: '<div style="background:#ffd93d;color:#333;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;border:2px solid white;box-shadow:0 1px 6px rgba(0,0,0,0.3);">🍽️</div>',
    iconSize: [28, 28], iconAnchor: [14, 14], popupAnchor: [0, -16]
  })
};

function buildMarkers() {
  allMarkers = [];
  DAYS.forEach((day, di) => {
    day.points.forEach(p => {
      const icon = ICONS[p.type] || ICONS.attraction;
      const marker = L.marker([p.lat, p.lng], { icon }).bindPopup(`
        <div>
          <div class="popup-is" onclick="copyText('${p.is}')">${p.is} 📋</div>
          <div class="popup-cn">${p.cn}</div>
          <div class="popup-coord">${p.lat.toFixed(4)}, ${p.lng.toFixed(4)} 📋</div>
          ${p.desc ? `<div style="color:#999;font-size:11px;margin-top:4px">${p.desc}</div>` : ''}
          <div style="font-size:10px;color:#555;margin-top:6px">${day.day} · ${day.nameCn}</div>
        </div>
      `);
      marker._dayIndex = di;
      marker._pointId = p.id;
      allMarkers.push(marker);
    });
  });
}

function showDay(dayIndex) {
  activeDay = dayIndex;
  const day = DAYS[dayIndex];
  
  // Clear markers
  markerGroup.clearLayers();
  
  // Add markers for this day
  const dayMarkers = allMarkers.filter(m => m._dayIndex === dayIndex);
  dayMarkers.forEach(m => markerGroup.addLayer(m));
  
  // Fit bounds
  if (dayMarkers.length > 0) {
    const group = L.featureGroup(dayMarkers);
    map.fitBounds(group.getBounds().pad(0.15));
  }
  
  // Update tabs
  document.querySelectorAll('.day-tab').forEach((tab, i) => {
    tab.classList.toggle('active', i === dayIndex);
  });
  
  // Scroll tab into view
  const activeTab = document.querySelector('.day-tab.active');
  if (activeTab) activeTab.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
  
  // Update sheet
  renderSheet(day, dayIndex);
}

function renderSheet(day, idx) {
  document.getElementById('sheetTitle').textContent = `${day.day} · ${day.nameCn}`;
  document.getElementById('sheetSubtitle').textContent = day.route || '';
  
  let html = '';
  
  // Points
  day.points.forEach(p => {
    const icons = { attraction:'📍', camp:'🏕️', shop:'🛒', food:'🍽️' };
    html += `<div class="poi-item">
      <div class="poi-icon ${p.type}">${icons[p.type] || '📍'}</div>
      <div class="poi-info">
        <div class="poi-name">
          <span onclick="copyText('${p.is}')" style="cursor:pointer">${p.is}</span>
          <span class="copy-badge">📋</span>
        </div>
        <div class="poi-cn">${p.cn}</div>
        ${p.desc ? `<div class="poi-desc">${p.desc}</div>` : ''}
        <div class="poi-coord">${p.lat.toFixed(4)}, ${p.lng.toFixed(4)}</div>
      </div>
    </div>`;
  });
  
  // Camp section
  if (day.camp) {
    html += `<div class="poi-item" style="border-top:1px solid rgba(255,255,255,0.1);margin-top:4px;padding-top:12px">
      <div class="poi-icon camp">🏕️</div>
      <div class="poi-info">
        <div class="poi-name">${day.camp.name}</div>
        ${day.camp.tags ? `<div class="camp-tags">${day.camp.tags.map(t => `<span class="camp-tag">${t}</span>`).join('')}</div>` : ''}
        ${day.camp.note ? `<div class="poi-desc">${day.camp.note}</div>` : ''}
      </div>
    </div>`;
  }
  
  // Schedule (D8)
  if (day.schedule) {
    html += `<div class="detail-section">
      <div class="label">⏰ 时间控制</div>`;
    day.schedule.forEach(s => {
      html += `<div class="value" style="display:flex;gap:12px;margin:3px 0"><span style="color:var(--gold);font-weight:500">${s.time}</span><span>${s.action}</span></div>`;
    });
    html += `</div>`;
    if (day.note) html += `<div style="font-size:12px;color:var(--accent2);margin-top:6px">✓ ${day.note}</div>`;
  }
  
  // Itinerary view link
  html += `<div class="itin-link" onclick="showAllDays()">📋 查看全部行程</div>`;
  
  document.getElementById('sheetContent').innerHTML = html;
}

function showAllDays() {
  document.getElementById('sheetTitle').textContent = '🗺️ 全部行程';
  document.getElementById('sheetSubtitle').textContent = '8天冰岛环岛之旅';
  
  // Show all markers
  markerGroup.clearLayers();
  allMarkers.forEach(m => markerGroup.addLayer(m));
  map.fitBounds(L.featureGroup(allMarkers).getBounds().pad(0.1));
  
  document.querySelectorAll('.day-tab').forEach(t => t.classList.remove('active'));
  
  // Build full itinerary
  let html = '';
  DAYS.forEach((day, idx) => {
    html += `<div style="margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
        <span style="background:var(--accent);color:white;padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600">${day.day}</span>
        <span style="font-size:13px;font-weight:500">${day.nameCn}</span>
        <span style="font-size:11px;color:var(--text2)">${day.date}</span>
      </div>`;
    day.points.forEach(p => {
      html += `<div class="poi-item" style="padding:6px 0">
        <div style="width:4px;height:4px;border-radius:50%;background:${p.type === 'camp' ? 'var(--accent2)' : 'var(--accent)'};margin:6px 8px 0 0;flex-shrink:0"></div>
        <div class="poi-info">
          <div class="poi-name"><span style="font-size:12px">${p.is}</span></div>
          <div class="poi-cn" style="font-size:11px">${p.cn}</div>
        </div>
      </div>`;
    });
    if (day.camp) {
      html += `<div style="font-size:11px;color:var(--accent2);padding:4px 0 0 12px">🏕️ ${day.camp.name}</div>`;
    }
    html += `</div>`;
  });
  
  document.getElementById('sheetContent').innerHTML = html;
}

// ===================== COPY =====================
function copyText(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(() => showToast('已复制: ' + text));
  } else {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('已复制: ' + text);
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

// ===================== UI INIT =====================
function init() {
  // Day tabs
  const tabs = document.getElementById('dayTabs');
  DAYS.forEach((day, i) => {
    const tab = document.createElement('div');
    tab.className = 'day-tab' + (i === 0 ? ' active' : '');
    let label = day.day;
    if (i === 0) label = '🗺️ 全部';
    tab.innerHTML = `${label} <span class="date">${day.date}</span>`;
    tab.addEventListener('click', () => {
      if (i === 0) showAllDays();
      else showDay(i - 1);
    });
    // First tab is "All"
    if (i === 0) tab.dataset.all = 'true';
    tabs.appendChild(tab);
  });
  
  // Actually, let's redo: first tab = All, rest = D1-D8
  tabs.innerHTML = '';
  
  const allTab = document.createElement('div');
  allTab.className = 'day-tab';
  allTab.innerHTML = '🗺️ 全部 <span class="date">8天</span>';
  allTab.addEventListener('click', showAllDays);
  tabs.appendChild(allTab);
  
  DAYS.forEach((day, i) => {
    const tab = document.createElement('div');
    tab.className = 'day-tab';
    tab.innerHTML = `${day.day} <span class="date">${day.date}</span>`;
    tab.addEventListener('click', () => showDay(i));
    tabs.appendChild(tab);
  });
  
  // Build markers
  buildMarkers();
  showAllDays();
  
  // Nav buttons
  document.getElementById('prevDay').addEventListener('click', () => {
    if (activeDay > 0) showDay(activeDay - 1);
  });
  document.getElementById('nextDay').addEventListener('click', () => {
    if (activeDay < DAYS.length - 1) showDay(activeDay + 1);
  });
  
  // Sheet handle - toggle expand
  let sheetExpanded = false;
  document.querySelector('.handle').addEventListener('click', () => {
    sheetExpanded = !sheetExpanded;
    document.querySelector('.bottom-sheet').style.maxHeight = sheetExpanded ? '80vh' : '42vh';
    document.querySelector('.sheet-scroll').style.maxHeight = sheetExpanded ? 'calc(80vh - 60px)' : 'calc(42vh - 60px)';
  });
}

// Init on load
document.addEventListener('DOMContentLoaded', init);
</script>
